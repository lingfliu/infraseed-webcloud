spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: data-service
          uri: lb://data-service
          predicates:
            - Path=/api/data/**
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/api/system/**

server:
  port: ${GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    nacos:
      discovery:
        enabled: false
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
        - id: data-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/data/**
        - id: system-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/system/**
